[build]
  command = "cd frontend && npm install --legacy-peer-deps --no-audit --no-fund && CI=false npm run build"
  publish = "frontend/build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"
  REACT_APP_BACKEND_URL = ""
  WDS_SOCKET_PORT = "443"
  ENABLE_HEALTH_CHECK = "false"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
